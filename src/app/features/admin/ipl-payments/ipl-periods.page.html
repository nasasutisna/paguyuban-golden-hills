<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/admin/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Periode IPL</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Year Filter -->
  <div class="year-filter">
    <div class="year-filter__label">
      <ion-icon name="calendar-outline"></ion-icon>
      <span>Tahun</span>
    </div>
    <ion-select
      [ngModel]="selectedYear"
      (ionChange)="onYearChange($event)"
      interface="popover"
      placeholder="Pilih Tahun"
      class="year-filter__select">
      @for (year of yearOptions; track year) {
        <ion-select-option [value]="year">{{ year }}</ion-select-option>
      }
    </ion-select>
  </div>

  <!-- Stats Cards -->
  <div class="stats-container ion-margin-top">
    @if (dataSource.loading) {
      <!-- Loading skeleton -->
      <div class="stats-skeleton">
        <ion-skeleton-text animated style="width: 100%; height: 80px; margin-bottom: 12px;"></ion-skeleton-text>
        <ion-skeleton-text animated style="width: 100%; height: 80px; margin-bottom: 12px;"></ion-skeleton-text>
      </div>
    } @else {
      <!-- Stats Cards -->
      <div class="stats-grid">
        <!-- Active Periods -->
        <ion-card class="stat-card success">
          <ion-card-content>
            <div class="stat-content">
              <div class="stat-icon">
                <ion-icon name="calendar-outline"></ion-icon>
              </div>
              <div class="stat-info">
                <div class="stat-value">{{ activeCount }}</div>
                <div class="stat-label">Aktif</div>
              </div>
            </div>
          </ion-card-content>
        </ion-card>

        <!-- Closed Periods -->
        <ion-card class="stat-card medium">
          <ion-card-content>
            <div class="stat-content">
              <div class="stat-icon">
                <ion-icon name="lock-closed-outline"></ion-icon>
              </div>
              <div class="stat-info">
                <div class="stat-value">{{ closedCount }}</div>
                <div class="stat-label">Tutup</div>
              </div>
            </div>
          </ion-card-content>
        </ion-card>

        <!-- Total Periods -->
        <ion-card class="stat-card primary">
          <ion-card-content>
            <div class="stat-content">
              <div class="stat-icon">
                <ion-icon name="layers-outline"></ion-icon>
              </div>
              <div class="stat-info">
                <div class="stat-value">{{ total }}</div>
                <div class="stat-label">Total</div>
              </div>
            </div>
          </ion-card-content>
        </ion-card>
      </div>
    }
  </div>

  <!-- Table Section -->
  <div>
    <app-table [config]="tableConfig" [dataSource]="dataSource" [statusBadges]="statusBadges" [currentPage]="currentPage"
      (actionClick)="onAction($event)" (filterChange)="onFilterChange($event)" (pageChange)="onPageChange($event)" (pageSizeChange)="onPageSizeChange($event)">
      <div table-actions>
        <ion-button fill="solid" color="primary" (click)="navigateToCreate()">
          <ion-icon slot="start" name="add-outline"></ion-icon>
          Buat Periode Baru
        </ion-button>
        <ion-button fill="outline" color="secondary" (click)="navigateToGenerate()">
          <ion-icon slot="start" name="calendar-outline"></ion-icon>
          Generate Setahun
        </ion-button>
      </div>
    </app-table>
  </div>
</ion-content>
