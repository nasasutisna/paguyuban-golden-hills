<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/admin/house-blocks"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ pageTitle }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="houseBlockForm" (ngSubmit)="onSubmit()">
    <!-- Basic Information -->
    <ion-card class="form-card">
      <ion-card-header>
        <ion-card-subtitle>Basic Information</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <app-form-input
          label="Block Code"
          formControlName="blockCode"
          placeholder="e.g., BLK-A"
          [maxlength]="20"
          [required]="true"
          [showError]="isFieldInvalid('blockCode')"
          [errorMessage]="getErrorMessage('blockCode')"
        ></app-form-input>

        <app-form-input
          label="Block Name"
          formControlName="blockName"
          placeholder="e.g., Block A - Residential"
          [maxlength]="100"
          [required]="true"
          [showError]="isFieldInvalid('blockName')"
          [errorMessage]="getErrorMessage('blockName')"
        ></app-form-input>

        <app-form-select
          label="Block Type"
          formControlName="blockType"
          placeholder="Select block type"
          [options]="blockTypeOptions"
          [required]="true"
          [showError]="isFieldInvalid('blockType')"
          [errorMessage]="getErrorMessage('blockType')"
        ></app-form-select>

        <app-form-input
          label="Address"
          formControlName="address"
          placeholder="e.g., Jalan Golden Hills Block A"
          [maxlength]="255"
          [showError]="isFieldInvalid('address')"
          [errorMessage]="getErrorMessage('address')"
        ></app-form-input>

        <ion-item class="toggle-item">
          <ion-label>Active Status</ion-label>
          <ion-toggle formControlName="isActive"></ion-toggle>
        </ion-item>
      </ion-card-content>
    </ion-card>

    <!-- Property Details -->
    <ion-card class="form-card">
      <ion-card-header>
        <ion-card-subtitle>Property Details</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <app-form-input
          label="Total Units"
          type="number"
          formControlName="totalUnits"
          placeholder="e.g., 24"
          [min]="0"
          [required]="true"
          [showError]="isFieldInvalid('totalUnits')"
          [errorMessage]="getErrorMessage('totalUnits')"
        ></app-form-input>

        <app-form-input
          label="Total Floors"
          type="number"
          formControlName="totalFloors"
          placeholder="e.g., 4"
          [min]="1"
          [showError]="isFieldInvalid('totalFloors')"
          [errorMessage]="getErrorMessage('totalFloors')"
        ></app-form-input>

        <app-form-input
          label="Construction Year"
          type="number"
          formControlName="constructionYear"
          placeholder="e.g., 2020"
          [min]="1900"
          [max]="currentYear + 1"
          [showError]="isFieldInvalid('constructionYear')"
          [errorMessage]="getErrorMessage('constructionYear')"
        ></app-form-input>
      </ion-card-content>
    </ion-card>

    <!-- Area Information -->
    <ion-card class="form-card">
      <ion-card-header>
        <ion-card-subtitle>Area Information</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <app-form-input
          label="Land Area (m²)"
          type="number"
          formControlName="landArea"
          placeholder="e.g., 2000"
          [min]="0"
          [showError]="isFieldInvalid('landArea')"
          [errorMessage]="getErrorMessage('landArea')"
        ></app-form-input>

        <app-form-input
          label="Building Area (m²)"
          type="number"
          formControlName="buildingArea"
          placeholder="e.g., 1500"
          [min]="0"
          [showError]="isFieldInvalid('buildingArea')"
          [errorMessage]="getErrorMessage('buildingArea')"
        ></app-form-input>
      </ion-card-content>
    </ion-card>

    <!-- Additional Information -->
    <ion-card class="form-card">
      <ion-card-header>
        <ion-card-subtitle>Additional Information</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <app-form-textarea
          label="Facilities (JSON)"
          formControlName="facilities"
          placeholder='e.g., {"parking": true, "gym": true, "pool": true}'
          [rows]="3"
          [showError]="isFieldInvalid('facilities')"
          [errorMessage]="getErrorMessage('facilities')"
          helperText="Enter as JSON object with boolean values for available facilities"
        ></app-form-textarea>

        <app-form-textarea
          label="Amenities"
          formControlName="amenities"
          placeholder="e.g., 24-hour security, children's playground, jogging track"
          [rows]="3"
          [showError]="isFieldInvalid('amenities')"
          [errorMessage]="getErrorMessage('amenities')"
        ></app-form-textarea>

        <app-form-textarea
          label="Description"
          formControlName="description"
          placeholder="Additional details about this block..."
          [rows]="4"
          [showError]="isFieldInvalid('description')"
          [errorMessage]="getErrorMessage('description')"
        ></app-form-textarea>
      </ion-card-content>
    </ion-card>

    <!-- Form Actions -->
    <div class="form-actions">
      <app-form-button
        text="Cancel"
        variant="outline"
        color="medium"
        expand="block"
        (click)="goBack()"
      ></app-form-button>
      <app-form-button
        [text]="submitButtonText"
        icon="checkmark-circle"
        iconSlot="start"
        variant="solid"
        color="primary"
        type="submit"
        expand="block"
        [disabled]="!isFormValid()"
        [loading]="isSubmitting"
      ></app-form-button>
    </div>
  </form>
</ion-content>
