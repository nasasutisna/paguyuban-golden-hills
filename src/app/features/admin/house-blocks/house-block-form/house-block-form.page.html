<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/admin/house-blocks"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ pageTitle }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="houseBlockForm" (ngSubmit)="onSubmit()">
    <!-- Basic Information -->
    <ion-card class="form-card">
      <ion-card-header>
        <ion-card-subtitle>Informasi Dasar</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <app-form-input
          label="Kode Blok"
          formControlName="blockCode"
          placeholder="contoh: BLK-A"
          [maxlength]="20"
          [required]="true"
          [showError]="isFieldInvalid('blockCode')"
          [errorMessage]="getErrorMessage('blockCode')"
        ></app-form-input>

        <app-form-input
          label="Nama Blok"
          formControlName="blockName"
          placeholder="contoh: Blok A - Perumahan"
          [maxlength]="100"
          [required]="true"
          [showError]="isFieldInvalid('blockName')"
          [errorMessage]="getErrorMessage('blockName')"
        ></app-form-input>

        <app-form-select
          label="Tipe Blok"
          formControlName="blockType"
          placeholder="Pilih tipe blok"
          [options]="blockTypeOptions"
          [required]="true"
          [showError]="isFieldInvalid('blockType')"
          [errorMessage]="getErrorMessage('blockType')"
        ></app-form-select>

        <app-form-input
          label="Alamat"
          formControlName="address"
          placeholder="contoh: Jalan Golden Hills Blok A"
          [maxlength]="255"
          [showError]="isFieldInvalid('address')"
          [errorMessage]="getErrorMessage('address')"
        ></app-form-input>

        <ion-item class="toggle-item">
          <ion-label>Status Aktif</ion-label>
          <ion-toggle formControlName="isActive"></ion-toggle>
        </ion-item>
      </ion-card-content>
    </ion-card>

    <!-- Property Details -->
    <ion-card class="form-card">
      <ion-card-header>
        <ion-card-subtitle>Detail Properti</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <app-form-input
          label="Total Unit"
          type="number"
          formControlName="totalUnits"
          placeholder="contoh: 24"
          [min]="0"
          [required]="true"
          [showError]="isFieldInvalid('totalUnits')"
          [errorMessage]="getErrorMessage('totalUnits')"
        ></app-form-input>

        <app-form-input
          label="Total Lantai"
          type="number"
          formControlName="totalFloors"
          placeholder="contoh: 4"
          [min]="1"
          [showError]="isFieldInvalid('totalFloors')"
          [errorMessage]="getErrorMessage('totalFloors')"
        ></app-form-input>

        <app-form-input
          label="Tahun Pembangunan"
          type="number"
          formControlName="constructionYear"
          placeholder="contoh: 2020"
          [min]="1900"
          [max]="currentYear + 1"
          [showError]="isFieldInvalid('constructionYear')"
          [errorMessage]="getErrorMessage('constructionYear')"
        ></app-form-input>
      </ion-card-content>
    </ion-card>

    <!-- Area Information -->
    <ion-card class="form-card">
      <ion-card-header>
        <ion-card-subtitle>Informasi Luas</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <app-form-input
          label="Luas Tanah (m²)"
          type="number"
          formControlName="landArea"
          placeholder="contoh: 2000"
          [min]="0"
          [showError]="isFieldInvalid('landArea')"
          [errorMessage]="getErrorMessage('landArea')"
        ></app-form-input>

        <app-form-input
          label="Luas Bangunan (m²)"
          type="number"
          formControlName="buildingArea"
          placeholder="contoh: 1500"
          [min]="0"
          [showError]="isFieldInvalid('buildingArea')"
          [errorMessage]="getErrorMessage('buildingArea')"
        ></app-form-input>
      </ion-card-content>
    </ion-card>

    <!-- Additional Information -->
    <ion-card class="form-card">
      <ion-card-header>
        <ion-card-subtitle>Informasi Tambahan</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <app-form-textarea
          label="Fasilitas (JSON)"
          formControlName="facilities"
          placeholder='contoh: {"parking": true, "gym": true, "pool": true}'
          [rows]="3"
          [showError]="isFieldInvalid('facilities')"
          [errorMessage]="getErrorMessage('facilities')"
          helperText="Masukkan dalam format JSON objek dengan nilai boolean untuk fasilitas yang tersedia"
        ></app-form-textarea>

        <app-form-textarea
          label="Fasilitas Tambahan"
          formControlName="amenities"
          placeholder="contoh: Keamanan 24 jam, taman bermain anak, jalur lari"
          [rows]="3"
          [showError]="isFieldInvalid('amenities')"
          [errorMessage]="getErrorMessage('amenities')"
        ></app-form-textarea>

        <app-form-select
          label="Koordinator Blok"
          formControlName="coordinatorId"
          placeholder="Pilih koordinator blok"
          [options]="coordinatorOptions"
          [showError]="isFieldInvalid('coordinatorId')"
          [errorMessage]="getErrorMessage('coordinatorId')"
        ></app-form-select>

        <app-form-textarea
          label="Deskripsi"
          formControlName="description"
          placeholder="Detail tambahan tentang blok ini..."
          [rows]="4"
          [showError]="isFieldInvalid('description')"
          [errorMessage]="getErrorMessage('description')"
        ></app-form-textarea>
      </ion-card-content>
    </ion-card>

    <!-- Form Actions -->
    <div class="form-actions">
      <app-form-button
        text="Batal"
        variant="outline"
        color="medium"
        expand="block"
        (click)="goBack()"
      ></app-form-button>
      <app-form-button
        [text]="submitButtonText"
        icon="save-outline"
        iconSlot="start"
        variant="solid"
        color="primary"
        type="submit"
        expand="block"
        [disabled]="!isFormValid()"
        [loading]="isSubmitting"
      ></app-form-button>
    </div>
  </form>
</ion-content>
