<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/admin/residents"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ pageTitle }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="residentForm" (ngSubmit)="onSubmit()">
    <!-- Basic Information -->
    <ion-card class="form-card">
      <ion-card-header>
        <ion-card-subtitle>Informasi Dasar</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <app-form-input
          label="Kode Warga"
          formControlName="residentCode"
          placeholder="contoh: RES001"
          [maxlength]="20"
          [required]="true"
          [showError]="isFieldInvalid('residentCode')"
          [errorMessage]="getErrorMessage('residentCode')"
        ></app-form-input>

        <app-form-input
          label="Nama Depan"
          formControlName="firstName"
          placeholder="contoh: Budi"
          [maxlength]="100"
          [required]="true"
          [showError]="isFieldInvalid('firstName')"
          [errorMessage]="getErrorMessage('firstName')"
        ></app-form-input>

        <app-form-input
          label="Nama Belakang"
          formControlName="lastName"
          placeholder="contoh: Santoso"
          [maxlength]="100"
          [required]="true"
          [showError]="isFieldInvalid('lastName')"
          [errorMessage]="getErrorMessage('lastName')"
        ></app-form-input>

        <app-form-input
          label="Email"
          type="email"
          formControlName="email"
          placeholder="contoh: budi.santoso@email.com"
          [showError]="isFieldInvalid('email')"
          [errorMessage]="getErrorMessage('email')"
        ></app-form-input>

        <app-form-input
          label="Nomor Telepon"
          type="tel"
          formControlName="phoneNumber"
          placeholder="contoh: +6281234567890"
        ></app-form-input>

        <app-form-input
          label="Telepon Alternatif"
          type="tel"
          formControlName="alternatePhone"
          placeholder="contoh: +6281234567891"
        ></app-form-input>

        <app-form-input
          label="Nomor Identitas (KTP/Paspor)"
          formControlName="identityNumber"
          placeholder="contoh: 1234567890123456"
        ></app-form-input>

        <ion-item class="date-item">
          <ion-label position="stacked">Tanggal Lahir</ion-label>
          <ion-datetime
            formControlName="dateOfBirth"
            presentation="date"
            placeholder="Pilih tanggal lahir"
          ></ion-datetime>
        </ion-item>

        <app-form-select
          label="Jenis Kelamin"
          formControlName="gender"
          placeholder="Pilih jenis kelamin"
          [options]="genderOptions"
        ></app-form-select>

        <app-form-input
          label="Pekerjaan"
          formControlName="occupation"
          placeholder="contoh: Insinyur"
          [maxlength]="100"
        ></app-form-input>

        <app-form-select
          label="Status Perkawinan"
          formControlName="maritalStatus"
          placeholder="Pilih status perkawinan"
          [options]="maritalStatusOptions"
        ></app-form-select>

        <ion-item class="toggle-item">
          <ion-label>Status Aktif</ion-label>
          <ion-toggle formControlName="isActive"></ion-toggle>
        </ion-item>
      </ion-card-content>
    </ion-card>

    <!-- Address & Emergency Contact -->
    <ion-card class="form-card">
      <ion-card-header>
        <ion-card-subtitle>Alamat & Kontak Darurat</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <app-form-textarea
          label="Alamat"
          formControlName="address"
          placeholder="contoh: Jalan Golden Hills No. 123"
          [rows]="3"
          [maxlength]="255"
        ></app-form-textarea>

        <app-form-input
          label="Nama Kontak Darurat"
          formControlName="emergencyContact"
          placeholder="contoh: Ahmad Santoso"
          [maxlength]="100"
        ></app-form-input>

        <app-form-input
          label="Nomor Telepon Darurat"
          type="tel"
          formControlName="emergencyPhone"
          placeholder="contoh: +6281234567892"
        ></app-form-input>
      </ion-card-content>
    </ion-card>

    <!-- Property Information -->
    <ion-card class="form-card">
      <ion-card-header>
        <ion-card-subtitle>Informasi Properti</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <app-form-select
          label="Blok Rumah"
          formControlName="houseBlockId"
          placeholder="Pilih blok rumah"
          [options]="houseBlockOptions"
          [required]="true"
          [showError]="isFieldInvalid('houseBlockId')"
          [errorMessage]="getErrorMessage('houseBlockId')"
        ></app-form-select>

        <app-form-input
          label="Nomor Unit"
          formControlName="unitNumber"
          placeholder="contoh: A-101"
          [maxlength]="20"
          [required]="true"
          [showError]="isFieldInvalid('unitNumber')"
          [errorMessage]="getErrorMessage('unitNumber')"
        ></app-form-input>

        <app-form-select
          label="Tipe Kepemilikan"
          formControlName="ownershipType"
          placeholder="Pilih tipe kepemilikan"
          [options]="ownershipTypeOptions"
          [required]="true"
          [showError]="isFieldInvalid('ownershipType')"
          [errorMessage]="getErrorMessage('ownershipType')"
        ></app-form-select>

        <ion-item class="date-item">
          <ion-label position="stacked">Tanggal Masuk</ion-label>
          <ion-datetime
            formControlName="moveInDate"
            presentation="date"
            placeholder="Pilih tanggal masuk"
          ></ion-datetime>
        </ion-item>

        <ion-item class="date-item">
          <ion-label position="stacked">Tanggal Keluar</ion-label>
          <ion-datetime
            formControlName="moveOutDate"
            presentation="date"
            placeholder="Pilih tanggal keluar"
          ></ion-datetime>
        </ion-item>
      </ion-card-content>
    </ion-card>

    <!-- Additional Information -->
    <ion-card class="form-card">
      <ion-card-header>
        <ion-card-subtitle>Informasi Tambahan</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <app-form-textarea
          label="Catatan"
          formControlName="notes"
          placeholder="Catatan tambahan tentang warga ini..."
          [rows]="4"
        ></app-form-textarea>
      </ion-card-content>
    </ion-card>

    <!-- Form Actions -->
    <div class="form-actions">
      <app-form-button
        text="Batal"
        variant="outline"
        color="medium"
        expand="block"
        (click)="goBack()"
      ></app-form-button>
      <app-form-button
        [text]="submitButtonText"
        icon="save-outline"
        iconSlot="start"
        variant="solid"
        color="primary"
        type="submit"
        expand="block"
        [disabled]="!isFormValid()"
        [loading]="isSubmitting"
      ></app-form-button>
    </div>
  </form>
</ion-content>
