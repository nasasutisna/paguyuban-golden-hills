<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/admin/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Pembayaran Warga</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Stats Cards -->
  <div class="stats-container ion-margin-top">
    @if (dataSource.loading) {
      <!-- Loading skeleton -->
      <div class="stats-skeleton">
        <ion-skeleton-text animated style="width: 100%; height: 80px; margin-bottom: 12px;"></ion-skeleton-text>
        <ion-skeleton-text animated style="width: 100%; height: 80px;"></ion-skeleton-text>
      </div>
    } @else {
      <!-- Stats Cards -->
      <div class="stats-grid">
        <!-- Total Payments -->
        <ion-card class="stat-card primary">
          <ion-card-content>
            <div class="stat-content">
              <div class="stat-icon">
                <ion-icon name="card-outline"></ion-icon>
              </div>
              <div class="stat-info">
                <div class="stat-value">{{ total }}</div>
                <div class="stat-label">Total</div>
              </div>
            </div>
          </ion-card-content>
        </ion-card>

        <!-- Completed -->
        <ion-card class="stat-card success">
          <ion-card-content>
            <div class="stat-content">
              <div class="stat-icon">
                <ion-icon name="checkmark-done-outline"></ion-icon>
              </div>
              <div class="stat-info">
                <div class="stat-value">{{ completedCount }}</div>
                <div class="stat-label">Selesai</div>
              </div>
            </div>
          </ion-card-content>
        </ion-card>
      </div>
    }
  </div>

  <!-- Table Section -->
  <div>
    <app-table [config]="tableConfig" [dataSource]="dataSource" [statusBadges]="statusBadges" [currentPage]="currentPage"
      (actionClick)="onAction($event)" (filterChange)="onFilterChange($event)" (pageChange)="onPageChange($event)">
      <div table-actions>
        <ion-button fill="solid" color="primary" (click)="navigateToCreate()">
          <ion-icon slot="start" name="cash-outline"></ion-icon>
          Catat Pembayaran
        </ion-button>
      </div>
    </app-table>
  </div>
</ion-content>
